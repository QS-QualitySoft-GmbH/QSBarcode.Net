name: CI

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x

      - name: Restore
        run: dotnet restore QualitySoft.Barcode.sln

      - name: Build
        run: dotnet build QualitySoft.Barcode.sln -c Release --no-restore

      - name: Test managed surface
        run: dotnet test QualitySoft.Barcode.Tests/QualitySoft.Barcode.Tests.csproj -c Release --no-build --filter "Category!=NativeSmoke"

      - name: Pack
        run: dotnet pack QualitySoft.Barcode/QualitySoft.Barcode.csproj -c Release --no-build -o artifacts
